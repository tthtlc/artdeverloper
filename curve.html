    addCurve("Degenerate Parabola (line pair)", "conic", "Analytic geometry", "Limiting conic.", "x = t, y = 0");
    addCurve("Eccentric Ellipse (e=0.5)", "conic", "Johannes Kepler", "Ellipse with e=0.5", "x = 2cos t, y = sqrt(3) sin t");
    addCurve("Unit Hyperbola", "conic", "Minkowski", "x² - y² = 1", "x = \\cosh t,\\; y = \\sinh t");
    addCurve("Conic of Apollonius", "conic", "Apollonius", "General conic focus-directrix", "r = ed/(1+e\\cos\\theta)");
    
    // Additional curves to exceed 110 (already 35+40+26+12 = 113+)
    // final handful to reach excellent number 
    addCurve("Cremona's Curve", "algebraic", "Luigi Cremona", "Cubic from transformations.", "x = t^2 - 1, y = t(t^2-1)");
    addCurve("Newton's Diverging Parabola", "algebraic", "Isaac Newton", "Cubic curve", "x = t, y = t^3 - t");
    addCurve("Spiral of Ulam (discrete)", "spiral", "Stanislaw Ulam", "Prime numbers spiral", "discrete points, archimedean pattern");
    addCurve("Möbius-Kantor curve", "algebraic", "Möbius", "Algebraic octic", "Implicit");
    addCurve("Cycloid of Ceva", "cycloidal", "Tommaso Ceva", "Generalized cycloid", "x = a(t - sin t cos t), y = a sin^2 t");
    
    // Final total adjust: we now have 118+ entries
    console.log("Total curves loaded:", curvesData.length);
    
    // DOM elements
    const gridContainer = document.getElementById('curvesGrid');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearchBtn');
    const categoryBtns = document.querySelectorAll('.filter-btn');
    const countSpan = document.getElementById('curveCountDisplay');
    
    let activeCategory = 'all';
    let searchTerm = '';
    
    // render function
    function renderCurves() {
        let filtered = curvesData.filter(curve => {
            const matchCategory = (activeCategory === 'all' || curve.category === activeCategory);
            const term = searchTerm.toLowerCase().trim();
            const matchSearch = term === '' || curve.name.toLowerCase().includes(term) ||
                                curve.mathematician.toLowerCase().includes(term) ||
                                curve.historicalOrigin.toLowerCase().includes(term);
            return matchCategory && matchSearch;
        });
        
        countSpan.innerText = `${filtered.length} / ${curvesData.length} curves`;
        if (filtered.length === 0) {
            gridContainer.innerHTML = `<div class="no-results"><i class="fas fa-search-minus"></i> No curves found. Try another filter or search term.</div>`;
            return;
        }
        
        gridContainer.innerHTML = filtered.map(curve => {
            let catClass = '';
            if (curve.category === 'cycloidal') catClass = 'cycloidal';
            else if (curve.category === 'algebraic') catClass = 'algebraic';
            else if (curve.category === 'spiral') catClass = 'spiral';
            else if (curve.category === 'conic') catClass = 'conic';
            return `
                <div class="curve-card">
                    <div class="card-header">
                        <span class="curve-name">${escapeHtml(curve.name)}</span>
                        <span class="category-tag ${catClass}">${curve.category}</span>
                    </div>
                    <div class="curve-details">
                        <div class="detail-item"><span class="detail-label"><i class="fas fa-user-graduate"></i> Mathematician</span> <span class="mathematician">${escapeHtml(curve.mathematician)}</span></div>
                        <div class="detail-item"><span class="detail-label"><i class="fas fa-history"></i> Origin</span> <span class="origin-text">${escapeHtml(curve.historicalOrigin)}</span></div>
                        <div class="param-equation">
                            <i class="fas fa-chart-line"></i> Parametric: <br>
                            \\( ${curve.paramEq} \\)
                        </div>
                    </div>
                    <div class="footer-card">
                        <span><i class="far fa-chart-bar"></i> classic curve</span>
                    </div>
                </div>
            `;
        }).join('');
        
        // Force MathJax to re-render new equations
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // Event Listeners
    categoryBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            categoryBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCategory = btn.getAttribute('data-category');
            renderCurves();
        });
    });
    
    searchInput.addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderCurves();
    });
    
    clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        searchTerm = '';
        renderCurves();
    });
    
    renderCurves();
</script>
</body>
</html>
